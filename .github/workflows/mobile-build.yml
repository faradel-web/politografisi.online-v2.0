name: Mobile Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'politografisi-mobile/**'

jobs:
  build-android:
    name: Build Android (APK/AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: politografisi-mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./politografisi-mobile

      - name: Build Android Production (AAB)
        run: eas build --platform android --profile production --non-interactive
        working-directory: ./politografisi-mobile

  build-ios:
    name: Build iOS (IPA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: politografisi-mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./politografisi-mobile

      - name: Build iOS Production (IPA)
        run: eas build --platform ios --profile production --non-interactive
        working-directory: ./politografisi-mobile
